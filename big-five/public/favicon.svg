<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#7b2d8e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#29358b"/>
      <stop offset="100%" stop-color="#80368d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- B -->
  <text x="100" y="230" font-family="Century Gothic, CenturyGothic, sans-serif" font-size="200" font-weight="bold" fill="white">B</text>
  <!-- G -->
  <text x="270" y="230" font-family="Century Gothic, CenturyGothic, sans-serif" font-size="200" font-weight="bold" fill="white">G</text>
  <!-- Diagonal accent line -->
  <line x1="245" y1="120" x2="275" y2="400" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <!-- F -->
  <text x="100" y="430" font-family="Century Gothic, CenturyGothic, sans-serif" font-size="180" font-weight="bold" fill="white">F</text>
  <!-- VE -->
  <text x="255" y="410" font-family="Century Gothic, CenturyGothic, sans-serif" font-size="110" font-weight="300" fill="white">VE</text>
</svg>
